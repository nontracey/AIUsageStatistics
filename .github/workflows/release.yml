name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - name: macOS-aarch64
            os: macos-14
            target: aarch64-apple-darwin
          - name: Linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: Windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.platform.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev dpkg-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar czf ../../../ai-usage-statistics-${{ matrix.platform.name }}.tar.gz ai-usage-statistics
          cd -

      - name: Package as .app bundle and .dmg (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUNDLE="AI Usage Statistics.app"
          mkdir -p "$BUNDLE/Contents/MacOS" "$BUNDLE/Contents/Resources"

          cp "target/${{ matrix.platform.target }}/release/ai-usage-statistics" \
             "$BUNDLE/Contents/MacOS/ai-usage-statistics"

          cp build/macos/AppIcon.icns "$BUNDLE/Contents/Resources/"

          sed "s/VERSION_PLACEHOLDER/$VERSION/g" build/macos/Info.plist > "$BUNDLE/Contents/Info.plist"

          hdiutil create -volname "AI Usage Statistics" \
            -srcfolder "$BUNDLE" \
            -ov -format UDZO \
            "AI-Usage-Statistics-${{ matrix.platform.name }}.dmg"

      - name: Package as .deb (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo install cargo-deb --locked
          cargo deb --target ${{ matrix.platform.target }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          7z a ../../../ai-usage-statistics-${{ matrix.platform.name }}.zip ai-usage-statistics.exe
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-usage-statistics-${{ matrix.platform.name }}
          path: |
            ai-usage-statistics-${{ matrix.platform.name }}.tar.gz
            ai-usage-statistics-${{ matrix.platform.name }}.zip
            AI-Usage-Statistics-*.dmg
            target/**/*.deb

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          echo "## AI Usage Statistics ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### 下载" >> release-notes.md
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' -o -name '*.deb' \) | sort | while read f; do
            name=$(basename "$f")
            echo "- \`$name\`" >> release-notes.md
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/*/*.tar.gz
            artifacts/*/*.zip
            artifacts/*/*.dmg
            artifacts/*/*.deb
